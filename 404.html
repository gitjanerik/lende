<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content (Chrome/Android 108+): virtuelt
         tastatur krymper LAYOUT-viewporten, ikke bare den visuelle. Uten denne
         forblir 100dvh/bottom-0 i full høyde bak tastaturet, så bunn-ankrede
         knapper (f.eks. «Lagre rute»/«Avbryt» i Ruteplanleggerens skuff-footer)
         var usynlige mens tastaturet var åpent. Eldre Chrome og iOS Safari
         ignorerer nøkkelordet (iOS beholder overlay-oppførselen sin). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0e1116" />
    <!-- Chromium «Auto Dark Theme» (Edge Android: «Dark mode for nettsteder»,
         Chrome Android: auto-mørking) tvangs-inverterer mørke farger på sider
         som ikke deklarerer fargeskjema — svarte stedsnavn og stiplede stier i
         kart-SVG-en ble hvite/usynlige. «only light» er den dokumenterte
         opt-out-en; appens egen mørke UI styres av eksplisitte farger og er
         upåvirket. -->
    <meta name="color-scheme" content="only light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Lende — turkart og ruteplanlegging fra ekte norske kartdata" />
    <!-- Privat hobbyprosjekt — skal ikke indekseres av søkemotorer. Meta-taggen
         er den effektive mekanismen på GitHub Pages project-sites (robots.txt
         leses kun fra domene-roten gitjanerik.github.io/, ikke fra /lende/).
         404.html er en kopi av denne fila, så alle SPA-ruter dekkes. -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/lende/favicon.svg" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/lende/manifest.webmanifest" />
    <!-- iOS home-screen icon (iOS doesn't read the manifest) -->
    <link rel="apple-touch-icon" href="/lende/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Så i lende" />
    <title>Så i lende</title>
    <!-- Fang `beforeinstallprompt` så tidlig som mulig. Eventet fyres ÉN gang,
         ofte FØR JS-bundelen og Vue er lastet — skjer det, mister vi det for
         godt og «Installer som app»-knappen dukker aldri opp i Chrome/Edge på
         Android. Vi stasher det på window; usePwaInstall plukker det opp ved
         oppstart (og lytter selv på senere fyringer). -->
    <script>
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault()
        window.__deferredInstallPrompt = e
      })
      window.addEventListener('appinstalled', function () {
        window.__deferredInstallPrompt = null
        window.__appInstalled = true
      })
    </script>
    <script type="module" src="/lende/assets/index-Dj_n_DM1.js"></script>
    <link rel="modulepreload" href="/lende/assets/symbolizer-DDqNqhHk.js">
    <link rel="modulepreload" href="/lende/assets/rolldown-runtime-Bh1tDfsg.js">
    <link rel="modulepreload" href="/lende/assets/preload-helper-CdCo1_m3.js">
    <link rel="modulepreload" href="/lende/assets/useSearchKeyboard-NYn2uP2B.js">
    <link rel="stylesheet" href="/lende/assets/index-DuvysEp0.css">
  </head>
  <body class="bg-[#0e1116] text-white/90 overscroll-none">
    <div id="app"></div>
  </body>
</html>
