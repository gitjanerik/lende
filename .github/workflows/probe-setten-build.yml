name: Probe Setten headless build

# Diagnose «innsjøer borte»-regresjonen (kun logg, committer ingenting).
# Midlertidig — slettes når årsaken er funnet.

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'scripts/probe-setten-build.mjs'
      - '.github/workflows/probe-setten-build.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Kjør probe
        run: node scripts/probe-setten-build.mjs
