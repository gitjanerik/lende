# MIDLERTIDIG: NVE Innsjødatabasen-helseprobe (slettes etter feilsøk).
name: probe-nve
on:
  push:
    branches: [claude/missing-islands-vmwfn5]
    paths: ['scripts/probe-nve.mjs', '.github/workflows/probe-nve.yml']
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/probe-nve.mjs
