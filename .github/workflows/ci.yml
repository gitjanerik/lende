# CI for pull requests: kjør testsuiten og produksjonsbygget på hver PR mot
# master, så regresjoner fanges før merge (deploy-workflowen build-vardasen-map
# kjører kun på push til master og validerer ingenting på PR-stadiet).
name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
