name: N50 water bake

# Laster ned N50 Kartdata for ALLE fylker via Geonorge Nedlasting-API, trekker
# ut INNSJØER (Innsjø + InnsjøRegulert) med ogr2ogr, reprojiserer til EPSG:4326
# og skriver ÉN FlatGeobuf per fylke + et manifest (public/data/n50-water/
# index.json). Store fylker deles i bbox-fliser < 100 MB. Kjøres i CI
# (nedlasting.geonorge.no er blokkert fra utviklingssandkassen). Elve-/
# bekkeflater og havflate droppes bevisst (elver fra OSM, sjø fra DEM/Sjøkart);
# alt ferskvann ville sprengt GitHubs 100 MB/fil-grense. Committer datasettet
# på branchen. Trigges når bake-script/workflow endres.

on:
  workflow_dispatch:
    inputs:
      area:
        description: "Fylkeskode eller 'all'"
        default: 'all'
        required: false
  push:
    branches: ['**']
    paths:
      - 'scripts/build-n50-water.mjs'
      - '.github/workflows/n50-water-probe.yml'

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install GDAL
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gdal-bin unzip
      - name: Bake N50 innsjøer (alle fylker)
        env:
          BAKE_DATE: ${{ github.event.repository.updated_at }}
        run: node scripts/build-n50-water.mjs --area "${{ github.event.inputs.area || 'all' }}" --out public/data/n50-water
      - name: Report sizes
        run: |
          ls -lh public/data/n50-water/
          echo "--- manifest ---"
          cat public/data/n50-water/index.json
          echo "--- største fil ---"
          find public/data/n50-water -name '*.fgb' -printf '%s %p\n' | sort -n | tail -1
      - name: Commit datasett if changed
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Fjern det gamle enkeltfil-datasettet hvis det fortsatt ligger der.
          git rm -q --ignore-unmatch public/data/n50-water.fgb || true
          # -A tar med SLETTINGER (stale fliser fra tidligere kjøringer som
          # bake-scriptet nå har ryddet bort), ikke bare nye/endrede filer.
          git add -A public/data/n50-water
          if git diff --staged --quiet; then
            echo "Ingen endring i N50-vann-datasettet"
          else
            git -c commit.gpgsign=false commit \
              --author="Deploy <deploy@lende>" \
              -m "N50-innsjøer per fylke — auto-generert fra Geonorge"
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "Committet oppdatert N50-vann-datasett"
          fi
