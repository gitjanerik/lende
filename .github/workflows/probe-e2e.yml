# MIDLERTIDIG: E2E-probe mot deployet app (slettes etter feilsøk).
name: Probe E2E browser build

on:
  workflow_dispatch:
  push:
    branches: [claude/missing-islands-vmwfn5]
    paths:
      - 'scripts/probe-e2e.mjs'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium
      - run: node scripts/probe-e2e.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-skjermbilder
          path: |
            e2e-nesoya.png
            e2e-setskog.png
          if-no-files-found: ignore
