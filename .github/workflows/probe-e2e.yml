name: Probe E2E browser build

# E2E-diagnose (kun logg + skjermbilde-artefakt): bygg et Setten-kart i ekte
# Chromium mot den deployede appen. Midlertidig — slettes når saken er løst.

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'scripts/probe-e2e.mjs'
      - '.github/workflows/probe-e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Installer Playwright
        run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium
      - name: Kjør E2E-probe mot deployet app
        run: node scripts/probe-e2e.mjs
      - name: Last opp skjermbilde
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-setten
          path: e2e-setten.png
          if-no-files-found: ignore
